version: "2"

linters:
  enable:
    - bodyclose
    - goprintffuncname
    - misspell
    - nolintlint
    - rowserrcheck
    - sqlclosecheck
    - tparallel
    - whitespace
    - govet
    - staticcheck
  disable:
    - errcheck  # Too noisy for initial development
    - ineffassign
    - revive  # Too noisy for current codebase; re-enable after adding a baseline.
    - unused
  settings:
    staticcheck:
      checks:
        - all
        - -ST1000
        - -QF*

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-rules:
    # Exclude some linters from running on tests files
    - path: _test\.go
      linters:
        - gocyclo
        - errcheck
        - dupl
        - gosec

run:
  timeout: 5m
  skip-dirs:
    - vendor
    - .phases
    - docs
